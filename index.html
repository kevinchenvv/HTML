<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>自我介紹</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
        <h1>陳柏宇</h1>
        
        <nav>
            <ul class="ul1">
                <li><a href="#" class="li1">關於我</a></li>
                <li><a href="#" class="li2">技能棧</a></li>
                <li><a href="#project" class="li3">作品集</a></li> 
                <li><a href="#talk" class="li3">資安課程報名表</a></li> 
            </ul>
        </nav>
    </header>
    <main class="container">
            <section class="left">
                <h2>關於我</h2>
                <img src="/img/OIP.jpg" alt="">
                <p>我叫陳柏宇，平時喜歡聽音樂喜歡玩遊戲</p>
            </section>
            <section class="right">
                <h2>技術棧</h2>
                <h3>前端</h3>
                <ul>
                    <li>Html, Css, Javascript</li>
                </ul>
                <h3>後端</h3>
                <ul>
                    <li>Java, Spring Boot, MySQL</li>
                </ul>
                <h3>Devops</h3>
                <ul>
                    <li>Git / Github, Docker</li>
                </ul>
            </section>
            <div id="project" class="project-title" style="text-align: center;"><h2>作品集</h2></div>
            <section class="project-1 card">
                <img src="img/OIP.jpg" alt="個人作品" style=width:100%;>
                <article class="textcenter">
                    <h3>AI技術情報機器人</h3>
                    <p>每天自動抓取技術社群的最新文章，透過AI過濾與摘要，推送到Discord的個人學習頻道。</p>
                </article>
            </section>
            <section class="project-2 card">
                <img src="img/OIP.jpg" alt="" style=width:100%; >
                <article class="textcenter">
                    <h3>胃旅圖</h3>
                    <p>以夜市觀光為主題結合遊戲化與數據營運想像的產品提案。</p>
                </article>
            </section>
            <div id="talk" class="talk-title"><h2>資安課程報名表</h2></div>
            <section class="textblock">
                <form action="" method="dialog" >
                    <label for="name">姓名: </label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">email: </label>
                    <input type="email" id="email" name="email" required>
                    <br><br>
                    <label for="InfoSec">您是否上過資安課程</label>
                    <input type="checkbox" name="InfoSec" id="InfoSec">
                    <br><br>
                    <label for="use">上課用途</label>
                    <select id="use">
                        <option value="">--請選擇--</option>
                        <option value="study">學習</option>
                        <option value="work">工作</option>
                    </select>
                    <br><br>
                    <label for="send">備註 : </label>
                    <textarea name="send" id="send" rows="5" cols="33"></textarea>
                    <br>
                    <input type="submit" value="Submit">
                </form>
            </section>
            <footer class="textcenter footer" >
                <p>版權所有</p>
            </footer>
    </main>
    
    <script src="./javascript/script.js"></script>
  </body>
</html>
